<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Hello, Flask</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    </head>
    <body>
        <h1>PDF to Audio Converter</h1>
        <hr />

        <form id="convert-form" action="/pdf-to-audio" enctype="multipart/form-data">
            <input type="file" id="file-picker" name="pdf_file" accept=".pdf" required>
            <button type="submit">Convert to Audio</button>
        </form>

        <audio controls id="audio-player" style="display: none;"></audio>
        
        
        <div id="file-details"></div>
        <!-- Preview the selected file (PDFs and images) -->
        <embed id="image-preview" type="application/pdf" width="700" height="1000" style="display:none;" />
        
        <script src="{{ url_for('static', filename='app.js') }}"></script>
    </body>
</html>
